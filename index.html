<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Countdown to Beer Time</title>

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json">

<!-- Theme colour (browser chrome on Android) -->
<meta name="theme-color" content="#1a3a5c">

<!-- iOS PWA support -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Beer Time">
<link rel="apple-touch-icon" href="icon-180.png">

<!-- Fallback icon for other browsers -->
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  /* ─── Dark theme (default) ─── */
  :root,
  [data-theme="dark"] {
    --bg:        #0a0a0f;
    --panel:     #12121a;
    --border:    #1e1e2e;
    --amber:     #f5a623;
    --amber-dim: #7a5210;
    --red:       #e03c3c;
    --green:     #2ecc71;
    --text:      #e8e0d0;
    --muted:     #5a5570;
    --input-bg:  #0e0e18;
    --glow:      rgba(245,166,35,0.18);
    --scan-line: rgba(0,0,0,0.08);
  }
  [data-theme="light"] {
    --bg:        #f2ede4;
    --panel:     #ffffff;
    --border:    #ddd6cc;
    --amber:     #c47a0a;
    --amber-dim: #e8d09a;
    --red:       #c0392b;
    --green:     #27ae60;
    --text:      #1a1410;
    --muted:     #9b8f80;
    --input-bg:  #f8f4ef;
    --glow:      rgba(196,122,10,0.10);
    --scan-line: rgba(0,0,0,0.02);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Oswald', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      var(--scan-line) 3px, var(--scan-line) 4px
    );
    pointer-events: none;
    z-index: 100;
  }
  .app {
    width: 100%; max-width: 520px;
    display: flex; flex-direction: column; gap: 20px;
  }
  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border); padding-bottom: 12px; gap: 8px;
  }
  .header h1 {
    font-size: 13px; letter-spacing: 6px;
    color: var(--muted); font-weight: 300; text-transform: uppercase;
  }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .wake-lock-badge {
    font-size: 10px; letter-spacing: 2px; padding: 3px 8px;
    border: 1px solid var(--muted); color: var(--muted); border-radius: 2px;
    transition: all 0.3s; white-space: nowrap;
  }
  .wake-lock-badge.active { border-color: var(--green); color: var(--green); }
  .theme-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    font-size: 14px; width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; padding: 0; line-height: 1; flex-shrink: 0;
  }
  .theme-btn:hover { border-color: var(--amber); color: var(--amber); }
  /* Clock */
  .clock-wrapper {
    background: var(--panel); border: 1px solid var(--border); border-radius: 4px;
    padding: 40px 20px 32px; display: flex; flex-direction: column;
    align-items: center; gap: 16px; position: relative; overflow: hidden;
    transition: background 0.3s, border-color 0.3s;
  }
  .clock-wrapper::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, var(--glow) 0%, transparent 70%);
    pointer-events: none;
  }
  .clock-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(72px, 20vw, 120px);
    color: var(--amber);
    text-shadow: 0 0 20px rgba(245,166,35,0.4), 0 0 60px rgba(245,166,35,0.12);
    letter-spacing: 4px; line-height: 1;
    transition: color 0.3s; user-select: none;
  }
  [data-theme="light"] .clock-display { text-shadow: 0 0 16px rgba(196,122,10,0.3); }
  .clock-display.danger {
    color: var(--red);
    text-shadow: 0 0 20px rgba(224,60,60,0.5), 0 0 60px rgba(224,60,60,0.15);
    animation: pulse-danger 0.5s ease-in-out infinite alternate;
  }
  @keyframes pulse-danger { from { opacity:1; } to { opacity:0.7; } }
  .clock-display.done {
    color: var(--green);
    text-shadow: 0 0 20px rgba(46,204,113,0.5), 0 0 60px rgba(46,204,113,0.15);
  }
  .rep-indicator {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase;
  }
  .rep-dots { display: flex; gap: 5px; }
  .rep-dot {
    width: 7px; height: 7px; border-radius: 50%;
    border: 1px solid var(--muted); transition: all 0.3s;
  }
  .rep-dot.done-dot   { background: var(--amber); border-color: var(--amber); }
  .rep-dot.active-dot { background: var(--amber); border-color: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .progress-bar-wrap {
    width: 100%; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden;
  }
  .progress-bar {
    height: 100%; background: var(--amber); border-radius: 2px;
    transition: width 0.4s linear, background 0.3s; box-shadow: 0 0 8px var(--amber);
  }
  .progress-bar.danger-bar { background: var(--red); box-shadow: 0 0 8px var(--red); }
  /* Settings */
  .settings { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field-group {
    background: var(--panel); border: 1px solid var(--border); border-radius: 4px;
    padding: 14px 16px; display: flex; flex-direction: column; gap: 8px;
    transition: background 0.3s, border-color 0.3s;
  }
  .field-group label {
    font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase;
  }
  .field-group input[type="number"] {
    background: var(--input-bg); border: 1px solid var(--border);
    color: var(--text); font-family: 'Share Tech Mono', monospace;
    font-size: 26px; width: 100%; padding: 6px 10px; border-radius: 3px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.3s;
    -moz-appearance: textfield;
  }
  .field-group input[type="number"]::-webkit-inner-spin-button,
  .field-group input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
  .field-group input[type="number"]:focus {
    border-color: var(--amber); box-shadow: 0 0 0 2px rgba(245,166,35,0.15);
  }
  .field-group input[type="number"].input-error {
    border-color: var(--red); box-shadow: 0 0 0 2px rgba(224,60,60,0.15);
  }
  .field-group input[type="number"]:disabled { opacity: 0.4; cursor: not-allowed; }
  .field-hint  { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
  .error-msg   { font-size: 10px; color: var(--red); letter-spacing: 1px; min-height: 14px; }
  /* Buttons */
  .controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .btn {
    font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 700;
    letter-spacing: 4px; text-transform: uppercase; border: none; border-radius: 3px;
    padding: 18px 12px; cursor: pointer; transition: all 0.15s; outline: none;
    position: relative; overflow: hidden;
  }
  .btn::after {
    content: ''; position: absolute; inset: 0;
    background: rgba(255,255,255,0); transition: background 0.15s;
  }
  .btn:active::after { background: rgba(255,255,255,0.08); }
  .btn-start {
    background: var(--amber); color: var(--bg); box-shadow: 0 0 20px rgba(245,166,35,0.25);
  }
  .btn-start:hover:not(:disabled) { box-shadow: 0 0 30px rgba(245,166,35,0.5); transform: translateY(-1px); }
  .btn-start:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-pause {
    background: transparent; color: var(--text); border: 1px solid var(--border);
  }
  .btn-pause:hover:not(:disabled) { border-color: var(--text); background: rgba(128,128,128,0.06); }
  .btn-pause:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-reset {
    background: transparent; color: var(--muted); border: 1px solid var(--border);
  }
  .btn-reset:hover { color: var(--red); border-color: var(--red); }
  /* Audio */
  .audio-section {
    background: var(--panel); border: 1px solid var(--border); border-radius: 4px;
    padding: 14px 16px; display: flex; flex-direction: column; gap: 10px;
    transition: background 0.3s, border-color 0.3s;
  }
  .audio-header { display: flex; align-items: center; justify-content: space-between; }
  .audio-header span { font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; }
  .audio-toggle-label {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; font-size: 11px; color: var(--muted); letter-spacing: 2px;
  }
  .toggle-switch {
    width: 34px; height: 18px; background: var(--border); border-radius: 9px;
    position: relative; transition: background 0.2s;
  }
  .toggle-switch::after {
    content: ''; position: absolute; width: 12px; height: 12px;
    background: var(--muted); border-radius: 50%; top: 3px; left: 3px; transition: all 0.2s;
  }
  #audio-enabled:checked + .audio-toggle-label .toggle-switch { background: var(--amber-dim); }
  #audio-enabled:checked + .audio-toggle-label .toggle-switch::after { left: 19px; background: var(--amber); }
  #audio-enabled { display: none; }
  .audio-file-row { display: flex; align-items: center; gap: 10px; }
  .audio-file-label {
    font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase;
    cursor: pointer; border: 1px dashed var(--border); padding: 8px 12px; border-radius: 3px;
    flex: 1; text-align: center; transition: all 0.2s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .audio-file-label:hover { border-color: var(--amber); color: var(--amber); }
  #custom-audio { display: none; }
  .audio-source-badge {
    font-size: 10px; letter-spacing: 2px; padding: 3px 8px;
    border: 1px solid var(--border); color: var(--muted); border-radius: 2px; white-space: nowrap;
  }
  /* Status */
  .status-bar {
    font-size: 11px; letter-spacing: 2px; color: var(--muted);
    text-align: center; text-transform: uppercase; min-height: 16px; transition: color 0.3s;
  }
  .status-bar.status-running { color: var(--amber); }
  .status-bar.status-done    { color: var(--green); }
  .status-bar.status-paused  { color: var(--text); }
  .status-bar.status-error   { color: var(--red); }
  /* Footer */
  .footer-bar {
    display: flex; align-items: center; justify-content: space-between;
    border-top: 1px solid var(--border); padding-top: 10px; gap: 8px;
  }
  .version-info { display: flex; align-items: center; gap: 8px; }
  .version-badge {
    font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 2px;
    color: var(--amber); border: 1px solid var(--amber-dim); padding: 2px 7px; border-radius: 2px;
  }
  .version-date { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
  .changelog-btn {
    font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; background: transparent; border: 1px solid var(--border);
    color: var(--muted); padding: 3px 10px; border-radius: 2px; cursor: pointer; transition: all 0.2s;
  }
  .changelog-btn:hover { border-color: var(--amber); color: var(--amber); }
  /* Modal */
  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(3px);
    z-index: 200; align-items: center; justify-content: center; padding: 24px 16px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
    width: 100%; max-width: 460px; max-height: 80vh; overflow-y: auto;
    display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: modal-in 0.18s ease-out;
  }
  @keyframes modal-in { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--panel); z-index: 1;
  }
  .modal-header h2 {
    font-size: 12px; letter-spacing: 4px; color: var(--muted);
    font-weight: 400; text-transform: uppercase;
  }
  .modal-close {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    width: 24px; height: 24px; border-radius: 50%; cursor: pointer;
    font-size: 14px; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; padding: 0;
  }
  .modal-close:hover { border-color: var(--red); color: var(--red); }
  .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 20px; }
  .cl-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 8px; }
  .cl-version { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: var(--amber); letter-spacing: 1px; }
  .cl-date    { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
  .cl-tag {
    font-size: 9px; letter-spacing: 2px; padding: 1px 6px;
    border-radius: 2px; text-transform: uppercase; margin-left: auto;
  }
  .cl-tag.latest  { background: var(--amber); color: var(--bg); }
  .cl-tag.release { border: 1px solid var(--muted); color: var(--muted); }
  .cl-items { list-style: none; display: flex; flex-direction: column; gap: 5px; }
  .cl-items li {
    font-size: 11px; letter-spacing: 1px; color: var(--text);
    padding-left: 16px; position: relative; line-height: 1.5;
  }
  .cl-items li::before { content: '▸'; position: absolute; left: 0; color: var(--muted); font-size: 9px; top: 2px; }
  .cl-divider { height: 1px; background: var(--border); }
  /* Credit footer */
  .credit-footer {
    text-align: center;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    padding-top: 4px;
    border-top: 1px solid var(--border);
    line-height: 1.6;
  }
  .credit-footer a {
    color: var(--amber);
    text-decoration: none;
    transition: opacity 0.2s;
  }
  .credit-footer a:hover { opacity: 0.7; }

  /* Responsive */
  @media (max-width: 440px) {
    .settings { grid-template-columns: 1fr 1fr; }
    .btn { font-size: 12px; letter-spacing: 2px; padding: 16px 8px; }
    .clock-display { font-size: 18vw; }
  }
  @media (max-width: 320px) { .controls { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>Countdown to Beer Time</h1>
    <div class="header-right">
      <div class="wake-lock-badge" id="wake-badge">SCREEN LOCK</div>
      <button class="theme-btn" id="theme-btn" title="Toggle light/dark mode">&#127769;</button>
    </div>
  </div>

  <div class="clock-wrapper">
    <div class="clock-display" id="clock">01:30</div>
    <div class="rep-indicator">
      <span>REPS</span>
      <div class="rep-dots" id="rep-dots"></div>
      <span id="rep-text">&#8212; / &#8212;</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar" style="width:100%"></div>
    </div>
  </div>

  <div class="settings">
    <div class="field-group">
      <label for="seconds-input">Seconds</label>
      <input type="number" id="seconds-input" min="1" max="86400" value="90" placeholder="90">
      <div class="field-hint">1 &#8211; 86400</div>
      <div class="error-msg" id="seconds-err"></div>
    </div>
    <div class="field-group">
      <label for="reps-input">Repetitions</label>
      <input type="number" id="reps-input" min="0" max="999" value="0" placeholder="0">
      <div class="field-hint">0 = run once</div>
      <div class="error-msg" id="reps-err"></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-start" id="btn-start">START</button>
    <button class="btn btn-pause" id="btn-pause" disabled>PAUSE</button>
    <button class="btn btn-reset" id="btn-reset">RESET</button>
  </div>

  <div class="audio-section">
    <div class="audio-header">
      <span>Audio</span>
      <input type="checkbox" id="audio-enabled" checked>
      <label for="audio-enabled" class="audio-toggle-label">
        <div class="toggle-switch"></div>
        SOUND ON
      </label>
    </div>
    <div class="audio-file-row">
      <label for="custom-audio" class="audio-file-label" id="audio-file-label">
        &#8593; Upload custom audio
      </label>
      <input type="file" id="custom-audio" accept="audio/*">
      <div class="audio-source-badge" id="audio-source">DEFAULT</div>
    </div>
  </div>

  <div class="status-bar" id="status-bar">READY &#8212; SET DURATION AND PRESS START</div>

  <div class="footer-bar">
    <div class="version-info">
      <span class="version-badge" id="ver-badge">v2.2.0</span>
      <span class="version-date" id="ver-date">16 Mar 2026</span>
    </div>
    <button class="changelog-btn" id="changelog-btn">CHANGELOG</button>
  </div>

  <div class="credit-footer">
    &copy; 2026 Made by <strong>Wheelsalert</strong> with help from Claude AI
  </div>

</div>

<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <div class="modal-header">
      <h2>Changelog</h2>
      <button class="modal-close" id="modal-close">&#x2715;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// VERSION & CHANGELOG
// ══════════════════════════════════════════════
var APP_VERSION = 'v2.2.0';
var APP_DATE    = '16 Mar 2026';

var CHANGELOG = [
  {
    version: 'v2.2.0',
    date:    '25 Mar 2026',
    tag:     'latest',
    changes: [
      'Fixed: first beep played wrong sound (synth instead of buzz MP3)',
      'Root cause: async race condition — decodeAudioData not finished before first play',
      'Fix: loadDefaultBeep() now returns a Promise; play functions wait for it to resolve',
    ]
  },
  {
    version: 'v2.1.0',
    date:    '25 Mar 2026',
    tag:     'release',
    changes: [
      'Fixed: audio silent on iOS — AudioContext now created inside user gesture only',

    ]

  {

      'After completion, last used values stay visible and inputs are unlocked for editing',

  },
  {

  {

  },
  {

    date:    '16 Mar 2026',

      'Added credit footer: © 2026 Made by Wheelsalert with help from Claude AI',

  {

  },
  {
    version: 'v1.2.0',
    date:    '16 Mar 2026',
    tag:     'release',
    changes: [
      'Added version tracking and CHANGELOG modal',

    ]
  },
  {
    version: 'v1.1.0',
    date:    '16 Mar 2026',

function b64ToArrayBuffer(b64) {
  var bin = atob(b64);
  var buf = new ArrayBuffer(bin.length);
  var view = new Uint8Array(buf);
  for (var i = 0; i < bin.length; i++) view[i] = bin.charCodeAt(i);
  return buf;
}

function renderChangelog() {
  modalBody.innerHTML = '';
  for (var i = 0; i < CHANGELOG.length; i++) {
    var entry = CHANGELOG[i];
    var div = document.createElement('div');

    var hdr = document.createElement('div');
    hdr.className = 'cl-header';

    var ver = document.createElement('span');
    ver.className = 'cl-version';
    ver.textContent = entry.version;

    var dt = document.createElement('span');
    dt.className = 'cl-date';
    dt.textContent = entry.date;

    var tag = document.createElement('span');
    tag.className = 'cl-tag ' + entry.tag;
    tag.textContent = entry.tag === 'latest' ? 'LATEST' : 'RELEASE';

    hdr.appendChild(ver);
    hdr.appendChild(dt);
    hdr.appendChild(tag);

    var ul = document.createElement('ul');
    ul.className = 'cl-items';
    for (var j = 0; j < entry.changes.length; j++) {
      var li = document.createElement('li');
      li.textContent = entry.changes[j];
      ul.appendChild(li);
    }

    div.appendChild(hdr);
    div.appendChild(ul);
    modalBody.appendChild(div);

    if (i < CHANGELOG.length - 1) {
      var hr = document.createElement('div');
      hr.className = 'cl-divider';
      modalBody.appendChild(hr);
    }
  }
}

function openModal()  { renderChangelog(); modalBackdrop.classList.add('open'); document.body.style.overflow = 'hidden'; }
function closeModal() { modalBackdrop.classList.remove('open'); document.body.style.overflow = ''; }

changelogBtn.addEventListener('click', openModal);
modalClose.addEventListener('click', closeModal);
modalBackdrop.addEventListener('click', function(e) { if (e.target === modalBackdrop) closeModal(); });
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

function validateSeconds(val) {
  var n = parseInt(val, 10);
  if (isNaN(n) || val === '') return { ok: false, msg: 'Required' };
  if (n < 1)                  return { ok: false, msg: 'Min 1 second' };
  if (n > 86400)              return { ok: false, msg: 'Max 86400 (24h)' };
  return { ok: true, val: n };
}
function validateReps(val) {
  var n = parseInt(val, 10);
  if (isNaN(n) || val === '') return { ok: false, msg: 'Required' };
  if (n < 0)                  return { ok: false, msg: 'Min 0' };
  if (n > 999)                return { ok: false, msg: 'Max 999' };
  return { ok: true, val: n };
}
function validateAll() {
  var s = validateSeconds(secondsInput.value);
  var r = validateReps(repsInput.value);
  secondsErr.textContent = s.ok ? '' : s.msg;
  repsErr.textContent    = r.ok ? '' : r.msg;
  secondsInput.classList.toggle('input-error', !s.ok);
  repsInput.classList.toggle('input-error',    !r.ok);
  return (s.ok && r.ok) ? { seconds: s.val, reps: r.val } : null;
}
secondsInput.addEventListener('input', function() {
  var s = validateSeconds(secondsInput.value);
  secondsErr.textContent = s.ok ? '' : s.msg;
  secondsInput.classList.toggle('input-error', !s.ok);
});
repsInput.addEventListener('input', function() {
  var r = validateReps(repsInput.value);
  repsErr.textContent = r.ok ? '' : r.msg;
  repsInput.classList.toggle('input-error', !r.ok);
});

// AUDIO
// ══════════════════════════════════════════════

// Track all scheduled source nodes so we can cancel them on RESET
var scheduledSources = [];

// FIX: Only create AudioContext inside a user-gesture handler.
// Calling this outside a gesture (e.g. at page load) puts iOS Safari
// into a permanently suspended state that cannot be recovered.
function getAudioCtx() {
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') {
    audioCtx.resume().catch(function() {});
  }
  return audioCtx;
}

// FIX: Load default beep lazily — only after AudioContext exists from
// a user gesture. Safe to call multiple times; skips if already loaded.
// FIX: Returns a Promise so callers can wait for decode to finish
// before playing. On first call this takes a few ms; subsequent calls
// resolve immediately because defaultAudioBuffer is already set.
function loadDefaultBeep() {
  if (defaultAudioBuffer) return Promise.resolve(defaultAudioBuffer);
  if (!audioCtx || audioCtx.state === 'closed') return Promise.resolve(null);
  return new Promise(function(resolve) {
    try {
      var buf = b64ToArrayBuffer(DEFAULT_BEEP_B64);
      audioCtx.decodeAudioData(buf, function(decoded) {
        defaultAudioBuffer = decoded;
        resolve(decoded);
      }, function(err) {
        console.warn('Could not decode embedded beep:', err);
        resolve(null);  // fall back to synth on decode error
      });
    } catch(e) {
      console.warn('loadDefaultBeep error:', e);
      resolve(null);
    }
  });
}

function playSynthBeep(startTime, ctx) {
  try {
    var osc  = ctx.createOscillator();
    var gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, startTime);
    osc.frequency.exponentialRampToValueAtTime(660, startTime + 0.08);
    gain.gain.setValueAtTime(0, startTime);
    gain.gain.linearRampToValueAtTime(0.55, startTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, startTime + 0.18);
    osc.start(startTime);
    osc.stop(startTime + 0.2);
    // Track for cancellation
    scheduledSources.push(osc);
    osc.onended = function() {
      scheduledSources = scheduledSources.filter(function(s) { return s !== osc; });
    };
  } catch(e) {
    console.warn('playSynthBeep error:', e);
  }
}

function playBufferBeep(buffer, startTime, ctx) {
  try {
    var src = ctx.createBufferSource();
    src.buffer = buffer;
    src.connect(ctx.destination);
    src.start(startTime);
    // Track for cancellation (FIX: allows RESET to silence pending beeps)
    scheduledSources.push(src);
    src.onended = function() {
      scheduledSources = scheduledSources.filter(function(s) { return s !== src; });
    };
  } catch(e) {
    console.warn('playBufferBeep error:', e);
  }
}

// Stop and clear all pre-scheduled audio nodes immediately
function stopAllScheduledAudio() {
  scheduledSources.forEach(function(src) {
    try { src.stop(0); } catch(e) {}
  });
  scheduledSources = [];
}

function playBeepOnce(delay) {
  if (!audioEnabled.checked) return;
  try {
    var ctx = getAudioCtx();
    // FIX: wait for decode to finish before reading defaultAudioBuffer
    loadDefaultBeep().then(function() {
      var buffer = customAudioBuffer || defaultAudioBuffer;
      var t = ctx.currentTime + (delay || 0);
      if (buffer) { playBufferBeep(buffer, t, ctx); }
      else        { playSynthBeep(t, ctx); }
    });
  } catch(e) {
    console.warn('playBeepOnce error:', e);
  }
}

function playBeepMulti(count, delay, interval) {
  if (!audioEnabled.checked) return;
  try {
    var ctx = getAudioCtx();
    // FIX: wait for decode to finish before reading defaultAudioBuffer
    loadDefaultBeep().then(function() {
      var buffer = customAudioBuffer || defaultAudioBuffer;
      for (var i = 0; i < count; i++) {
        var t = ctx.currentTime + (delay || 0) + i * (interval || 1.0);
        if (buffer) { playBufferBeep(buffer, t, ctx); }
        else        { playSynthBeep(t, ctx); }
      }
    });
  } catch(e) {
    console.warn('playBeepMulti error:', e);
  }
}

customAudio.addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var ctx = getAudioCtx();
  var reader = new FileReader();
  reader.onload = function(ev) {
    ctx.decodeAudioData(ev.target.result, function(decoded) {
      customAudioBuffer = decoded;
      audioLabel.textContent  = String.fromCharCode(10003) + ' ' + file.name;
      audioSource.textContent = 'CUSTOM';
    }, function() {
      setStatus('Audio file could not be decoded', 'error');
      customAudioBuffer = null;
      audioSource.textContent = 'DEFAULT';
      audioLabel.textContent  = String.fromCharCode(8593) + ' Upload custom audio';
    });
  };
  reader.readAsArrayBuffer(file);
});

// ══════════════════════════════════════════════
// WAKE LOCK
// ══════════════════════════════════════════════
function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  navigator.wakeLock.request('screen').then(function(wl) {
    wakeLock = wl;
    wakeBadge.textContent = 'AWAKE';
    wakeBadge.classList.add('active');
    wl.addEventListener('release', function() {
      wakeBadge.textContent = 'SCREEN LOCK';
      wakeBadge.classList.remove('active');
    });
  }).catch(function() {});
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release(); wakeLock = null; }
}
document.addEventListener('visibilitychange', function() {
  if (isRunning && document.visibilityState === 'visible') requestWakeLock();
});

// ══════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════
function formatTime(s) {
  var h   = Math.floor(s / 3600);
  var m   = Math.floor((s % 3600) / 60);
  var sec = s % 60;
  var pad = function(n) { return String(n).padStart(2, '0'); };
  if (h > 0) return pad(h) + ':' + pad(m) + ':' + pad(sec);
  return pad(m) + ':' + pad(sec);
}

function updateClock() {
  clockEl.textContent = formatTime(currentSeconds);
  var pct = totalSeconds > 0 ? (currentSeconds / totalSeconds) * 100 : 0;
  progressBar.style.width = pct + '%';
  var danger = currentSeconds <= 5 && currentSeconds > 0;
  clockEl.classList.toggle('danger', danger && isRunning);
  progressBar.classList.toggle('danger-bar', danger && isRunning);
  clockEl.classList.toggle('done', isDone);
}

function buildRepDots() {
  repDotsEl.innerHTML = '';
  var total = totalReps === 0 ? 1 : totalReps;
  var shown = Math.min(total, 10);
  for (var i = 0; i < shown; i++) {
    var dot = document.createElement('div');
    dot.className = 'rep-dot';
    if (i < currentRep)                      dot.classList.add('done-dot');
    else if (i === currentRep && !isDone)    dot.classList.add('active-dot');
    repDotsEl.appendChild(dot);
  }
  if (total > 10) {
    var sp = document.createElement('span');
    sp.style.cssText = 'font-size:10px;color:var(--muted);margin-left:4px;';
    sp.textContent = '+' + (total - 10);
    repDotsEl.appendChild(sp);
  }
  var totalLabel = totalReps === 0 ? '1' : String(totalReps);
  var currentLabel = (isRunning || isPaused) && !isDone ? String(currentRep + 1) : (isDone ? String(currentRep) : String(0));
  if (!isRunning && !isPaused && !isDone) {
    repTextEl.innerHTML = '&#8212; / ' + totalLabel;
  } else {
    repTextEl.textContent = currentLabel + ' / ' + totalLabel;
  }
}

function setStatus(msg, type) {
  statusBar.textContent = msg;
  statusBar.className   = 'status-bar' + (type ? ' status-' + type : '');
}

function setInputsEditable(editable) {
  secondsInput.disabled = !editable;
  repsInput.disabled    = !editable;
}

function updateButtons() {
  if (isRunning) {
    btnStart.disabled    = true;
    btnPause.disabled    = false;
    btnPause.textContent = 'PAUSE';
  } else if (isPaused) {
    btnStart.disabled    = false;
    btnPause.disabled    = false;
    btnPause.textContent = 'RESUME';
    btnStart.textContent = 'START';
  } else {
    btnStart.disabled    = false;
    btnPause.disabled    = true;
    btnPause.textContent = 'PAUSE';
    btnStart.textContent = 'START';
  }
}

// ══════════════════════════════════════════════
// TIMER CORE
// ══════════════════════════════════════════════
function tick() {
  if (!isRunning) return;
  currentSeconds--;
  updateClock();
  if (currentSeconds <= 0) {
    var totalRepsNeeded = totalReps === 0 ? 1 : totalReps;
    currentRep++;
    buildRepDots();
    if (currentRep >= totalRepsNeeded) {
      finishAll();
    } else {
      currentSeconds = totalSeconds;
      updateClock();
      setStatus('REP ' + (currentRep + 1) + ' OF ' + totalRepsNeeded + ' — STARTING', 'running');
      playBeepOnce(0.05);
      buildRepDots();
    }
  }
}

function finishAll() {
  clearInterval(timerId);
  timerId   = null;
  isRunning = false;
  isPaused  = false;
  isDone    = true;
  // Keep last used values displayed but unlock inputs for editing
  updateClock();
  setStatus('COMPLETE — ALL REPETITIONS DONE', 'done');
  playBeepMulti(3, 0.1, 1.0);
  releaseWakeLock();
  setInputsEditable(true);
  updateButtons();
  buildRepDots();
}

function startTimer() {
  if (timerId) clearInterval(timerId);
  isRunning = true;
  isDone    = false;
  timerId   = setInterval(tick, 1000);
  updateClock();
  updateButtons();
  buildRepDots();
  requestWakeLock();
}

// ══════════════════════════════════════════════
// BUTTON HANDLERS
// ══════════════════════════════════════════════
btnStart.addEventListener('click', function() {
  getAudioCtx();

  if (isPaused) {
    var sv = validateSeconds(secondsInput.value);
    if (!sv.ok) {
      secondsErr.textContent = sv.msg;
      secondsInput.classList.add('input-error');
      setStatus('FIX SECONDS VALUE BEFORE RESUMING', 'error');
      return;
    }
    if (sv.val !== totalSeconds) {
      totalSeconds   = sv.val;
      currentSeconds = sv.val;
    }
    setInputsEditable(false);
    isPaused  = false;
    isRunning = true;
    setStatus('RUNNING — ' + (totalReps === 0 ? 1 : totalReps) + ' REP(S) TOTAL', 'running');
    updateButtons();
    startTimer();
    return;
  }

  var validated = validateAll();
  if (!validated) {
    setStatus('FIX ERRORS BEFORE STARTING', 'error');
    return;
  }

  totalSeconds   = validated.seconds;
  totalReps      = validated.reps;
  currentSeconds = totalSeconds;
  currentRep     = 0;
  isDone         = false;

  setInputsEditable(false);
  var label = totalReps === 0 ? 1 : totalReps;
  setStatus('RUNNING — ' + label + ' REP(S) TOTAL', 'running');
  buildRepDots();
  updateClock();
  playBeepOnce(0.05);
  startTimer();
});

btnPause.addEventListener('click', function() {
  if (isRunning) {
    clearInterval(timerId);
    timerId   = null;
    isRunning = false;
    isPaused  = true;
    releaseWakeLock();
    setInputsEditable(true);
    setStatus('PAUSED — EDIT SECONDS THEN RESUME', 'paused');
    updateButtons();
    clockEl.classList.remove('danger');
    progressBar.classList.remove('danger-bar');
  } else if (isPaused) {
    btnStart.click();
  }
});

btnReset.addEventListener('click', function() {
  // Stop the interval immediately
  clearInterval(timerId);
  timerId = null;

  // FIX: Cancel any beeps that are pre-scheduled but haven't fired yet
  stopAllScheduledAudio();

  // FIX: If AudioContext is in a bad state, close it so it gets
  // recreated fresh on the next START press
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.close().catch(function() {});
    audioCtx          = null;
    defaultAudioBuffer = null;
    // Note: customAudioBuffer is kept so user doesn't need to re-upload
  }

  // Reset all state
  isRunning            = false;
  isPaused             = false;
  isDone               = false;
  currentRep           = 0;
  totalSeconds         = DEFAULT_SECONDS;
  totalReps            = DEFAULT_REPS;
  currentSeconds       = DEFAULT_SECONDS;
  secondsInput.value   = DEFAULT_SECONDS;
  repsInput.value      = DEFAULT_REPS;
  secondsErr.textContent = '';
  repsErr.textContent    = '';
  secondsInput.classList.remove('input-error');
  repsInput.classList.remove('input-error');

  // FIX: Remove visual classes BEFORE updateClock so no frame glitch
  clockEl.classList.remove('danger', 'done');
  progressBar.classList.remove('danger-bar');

  releaseWakeLock();
  setInputsEditable(true);
  updateClock();
  updateButtons();
  buildRepDots();
  setStatus('READY — SET DURATION AND PRESS START');
  progressBar.style.width = '100%';
});

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
function init() {
  secondsInput.value = DEFAULT_SECONDS;
  repsInput.value    = DEFAULT_REPS;
  currentSeconds     = DEFAULT_SECONDS;
  totalSeconds       = DEFAULT_SECONDS;
  totalReps          = DEFAULT_REPS;
  verBadge.textContent = APP_VERSION;
  verDate.textContent  = APP_DATE;
  updateClock();
  buildRepDots();
  updateButtons();
  setInputsEditable(true);
  // FIX: Do NOT call loadDefaultBeep() here.
  // AudioContext must be created inside a user gesture (START click).
  // loadDefaultBeep() is called lazily inside playBeepOnce/playBeepMulti.
}

init();
</script>

// ── PWA Service Worker Registration ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js')
      .then(function(reg) {
        console.log('Beer Time SW registered:', reg.scope);
      })
      .catch(function(err) {
        console.warn('Beer Time SW registration failed:', err);
      });
  });
}
</script>
